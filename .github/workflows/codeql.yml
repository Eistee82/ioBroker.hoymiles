name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 4 * * 3"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          # Exclude js/insufficient-password-hash: The Hoymiles cloud API
          # requires MD5+SHA256 credential hashes for authentication
          # (pre-inspect response has no salt/Argon2 support yet).
          # This is a protocol-mandated transform, not password storage.
          # See: src/lib/utils.ts buildCredentialChallenges()
          config: |
            query-filters:
              - exclude:
                  id: js/insufficient-password-hash
      - run: npm ci && npm run build
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
